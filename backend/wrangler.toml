name = "meetingmind-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "MEETING_JOBS"
id = "5045e3a5c29144f195402d583662790c"

# ===== Phase 9: Audio storage =====
[[r2_buckets]]
binding = "MEETING_AUDIO"
bucket_name = "meeting-audio"
# ==================================

[[env.staging]]
name = "meetingmind-api-staging"
vars = { ENVIRONMENT = "staging" }

[[env.production]]
name = "meetingmind-api-production"
vars = { ENVIRONMENT = "production" }
kv_namespaces = [
  { binding = "MEETING_JOBS", id = "5045e3a5c29144f195402d583662790c" }
]
# ===== Phase 9: Audio storage (production) =====
r2_buckets = [
  { binding = "MEETING_AUDIO", bucket_name = "meeting-audio" }
]
# ================================================
[env.production.triggers]
crons = ["*/15 * * * *"]